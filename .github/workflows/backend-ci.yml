name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rbms_test
          POSTGRES_USER: rbms_test
          POSTGRES_PASSWORD: rbms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rbms_test -d rbms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      # Connection string consumed by integration tests.
      ConnectionStrings__Default: "Host=localhost;Port=5432;Database=rbms_test;Username=rbms_test;Password=rbms_test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        working-directory: backend
        run: >-
          dotnet test --no-build -c Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: Integration tests
        working-directory: backend
        run: >-
          dotnet test --no-build -c Release
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/TestResults/*.trx
