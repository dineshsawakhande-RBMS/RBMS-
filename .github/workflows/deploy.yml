name: Deploy

# Deploys the API and Web images and rolls the ECS service.
#
# Required GitHub configuration (Settings -> Secrets and variables -> Actions):
#   Secrets:
#     AWS_ROLE_ARN          IAM role ARN assumed via OIDC (no static keys)
#   Variables (vars):
#     AWS_REGION            e.g. ap-south-1
#     AWS_ACCOUNT_ID        12-digit account id
#     ECR_API_REPOSITORY    e.g. rbms-production-api
#     ECR_WEB_REPOSITORY    e.g. rbms-production-web
#     ECS_CLUSTER           e.g. rbms-production-cluster
#     ECS_API_SERVICE       e.g. rbms-production-api
#     API_BASE_URL          public API URL baked into the web build
#
# The AWS_ROLE_ARN trust policy must allow this repo's OIDC subject and the
# role must be able to push to ECR and update the ECS service.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        run: |
          IMAGE="$ECR_REGISTRY/${{ vars.ECR_API_REPOSITORY }}"
          docker build -f infra/docker/api.Dockerfile \
            -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Build & push Web image
        run: |
          IMAGE="$ECR_REGISTRY/${{ vars.ECR_WEB_REPOSITORY }}"
          docker build -f infra/docker/web.Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ vars.API_BASE_URL }}" \
            -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Run database migrations
        # Placeholder: runs EF Core migrations against the production database.
        # Replace with a one-off ECS RunTask (recommended) or a migration job.
        # Example with the dotnet-ef tool against a bundle:
        #   dotnet ef database update --project backend/src/RBMS.Infrastructure
        run: |
          echo "TODO: run 'dotnet ef database update' via a one-off ECS task"
          echo "Using image $ECR_REGISTRY/${{ vars.ECR_API_REPOSITORY }}:$IMAGE_TAG"

      - name: Force new ECS deployment (API)
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_API_SERVICE }}" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_API_SERVICE }}" \
            --region "$AWS_REGION"
