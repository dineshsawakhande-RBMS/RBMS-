# Local development stack for RBMS: PostgreSQL + API + Web.
#   cp .env.example .env
#   docker compose up --build

services:
  db:
    image: postgres:16-alpine
    container_name: rbms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rbms}
      POSTGRES_USER: ${POSTGRES_USER:-rbms_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbms_admin} -d ${POSTGRES_DB:-rbms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: rbms-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-rbms};Username=${POSTGRES_USER:-rbms_admin};Password=${POSTGRES_PASSWORD:-changeme_local}"
      Jwt__Issuer: ${JWT_ISSUER:-rbms-api}
      Jwt__Audience: ${JWT_AUDIENCE:-rbms-api}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-local_dev_signing_key_change_me_please_32+chars}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: rbms-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  db_data:
